name: Build Flutter APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.16.0'
          channel: 'stable'
      
      - name: Check Flutter installation
        run: flutter doctor
      
      - name: Create assets directory if not exists
        run: |
          mkdir -p assets/images
          if [ ! -f assets/images/images.jpg ]; then
            echo "Creating placeholder image"
            echo "iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAQAAAC1HAwCAAAAC0lEQVR42mNkYAAAAAYAAjCB0C8AAAAASUVORK5CYII=" | base64 --decode > assets/images/images.jpg
          fi
          if [ ! -f assets/images/solar_bg.png ]; then
            echo "Creating placeholder background"
            echo "iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAQAAAC1HAwCAAAAC0lEQVR42mNkYAAAAAYAAjCB0C8AAAAASUVORK5CYII=" | base64 --decode > assets/images/solar_bg.png
          fi
      
      - name: Fix pubspec.yaml if needed
        run: |
          # Fix SDK version if it's ^3.9.2
          sed -i 's/sdk: \^3.9.2/sdk: ">=3.0.0 <4.0.0"/g' pubspec.yaml || true
      
      - name: Clean project
        run: flutter clean
      
      - name: Get dependencies
        run: flutter pub get
      
      - name: Build APK
        run: flutter build apk --release
      
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: build/app/outputs/flutter-apk/app-release.apk
          if-no-files-found: error
      
      - name: Upload debug APK (fallback)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: build/app/outputs/flutter-apk/app-debug.apk